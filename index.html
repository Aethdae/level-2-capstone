<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Level Two Capstone</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="module" src="index.js" defer></script>
    <script type="module" src="Responses.js" defer></script>
    <script type="module" src="keys.js" defer></script>
    <script type="module" src="BattleHandler.js" defer></script>
    <script type="module" src="ChatHandler.js" defer></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-orange-950">
    <header class="bg-black py-4 border-b-10 border-red-950">
      <h1
        class="text-white font-[Pirata_One] text-4xl tracking-widest text-shadow-gray-600 text-shadow-lg font-bold text-center"
      >
        Enemies You
        <span class="text-pink-400 text-shadow-white text-shadow-lg">Love</span>
        to
        <span class="text-red-900 text-shadow-white text-shadow-lg">
          Hate
        </span>
      </h1>
    </header>
    <main class="h-[120vh]">
      <section
        class="h-[60vh] flex flex-col gap-4 md:gap-8 lg:gap-12 xl:gap-16"
        id="hero"
      >
        <div
          class="flex justify-center text-white bg-gray-800/80 outline-2 outline-offset-[-6px] py-2 rounded-2xl md:py-6 lg:py-8 lg:mx-auto lg:px-8"
        >
          <h2 class="font-bold md:text-2xl lg:text-3xl">
            Do your tabletop rpg battles feel like this?
          </h2>
        </div>
        <div id="battleContainer" class="flex justify-center">
          <div
            id="battleArea"
            class="bg-gray-400 min-h-[250px] w-[90%] relative rounded-4xl bg-[url('images/grid.png')]"
          >
            <img
              id="warrior"
              class="absolute top-[50%] left-[2%] md:left-[20%] transition-all duration-400 ease-in-out"
              src="images/warrior.png"
              alt="pixel art, poorly drawn knight in armor"
            />
            <img
              id="dragon"
              class="absolute top-[2%] left-[60%] md:left-[60%] transition-all duration-400 ease-in-out"
              src="images/drag.png"
              alt="pixel art, poorly drawn dragon"
            />
          </div>
        </div>
        <div
          class="flex mx-4 py-4 gap-3 flex-col items-center outline-black outline-4 outline-offset-[-2px] text-white bg-gray-950/50 px-2 rounded-2xl md:gap-6 md:mx-15 lg:gap-9 lg:mx-30 lg:my-4"
        >
          <h2
            class="text-2xl bg-blue-600 text-white p-3 outline-2 outline-black rounded-2xl text-red-900 font-bold md:text-3xl md:p-6 lg:p-8 lg:text-4xl"
          >
            Well no more!
          </h2>
          <p
            class="text-lg text-center font-bold text-shadow-black text-shadow-lg md:text-lg lg:text-xl xl:text-2xl"
          >
            Try our state-of-the-art* Monster Creator 3000!
          </p>
          <ul
            class="*:italic bg-blue-600 text-white border-2 border-black px-6 py-3 rounded-4xl md:text-2xl md:px-12 md:py-6 lg:px-18 lg:py-9"
          >
            <li>Create monsters in a flash!</li>
            <li>No more boring encounters.</li>
            <li>Seemlessly works in any system.</li>
          </ul>
        </div>
        <div
          class="flex justify-center mx-auto max-w-[50%] text-white bg-gray-800 outline-2 outline-offset-[-6px] py-2 rounded-2xl cursor-pointer hover:outline-white hover:outline-offset-[-2px] hover:bg-gray-700 transition-all duration-150"
        >
          <h2
            id="altButton"
            class="min-w-[300px] text-center md:text-xl md:w-[450px] lg:w-[600px] lg:text-2xl"
          >
            Try it out!
          </h2>
        </div>
      </section>
    </main>
    <div
      class="fixed flex flex-col gap-3 bg-gray-500 rounded-2xl outline-2 outline-white transition-(bottom) duration-300 right-[1rem] bottom-[-24rem] min-h-[250px] w-[300px] md:bottom-[-24rem] md:w-[350px] md:h-[450px] lg:h-[600px] lg:w-[450px] lg:bottom-[-34rem]"
      id="chatContainer"
    >
      <header id="chatHeader">
        <div
          class="bg-gray-400 hover:border-white hover:bg-gray-300 transition-all duration-150 py-3 text-2xl border-b border-2 border-black rounded-3xl cursor-pointer text-center"
        >
          <h2
            class="font-bold md:text-2xl lg:text-2xl after:content-['_▲']"
            id="aiAssistantHeader"
          >
            Monster Creator 3000
          </h2>
        </div>
      </header>
      <output
        id="outputContainer"
        class="flex flex-col text-sm bg-gray-200 h-[240px] overflow-y-auto border-2 border-black mb-4 rounded-2xl p-2 gap-2 scroll:rounded-md md:text-lg lg:text-xl lg:h-[370px]"
      ></output>
      <div
        class="flex flex-col justify-center gap-2 items-center border-2 border-white rounded-2xl md:gap-6"
      >
        <form class="border-black" id="responseForm">
          <label
            class="text-black rounded-xl font-bold text-center flex flex-col md:text-xl"
          >
            Response:
            <input
              class="bg-gray-200 text-black border-2 rounded-xl border-black px-6"
              type="text"
              name="textArea"
              id="textArea"
              required
              placeholder="Enter a response..."
            />
          </label>
          <div class="flex justify-center">
            <button
              class="bg-gray-400 rounded-xl border-2 border-black px-3 py-2 transition-all duration-200 delay-100 mb-4 hover:border-white hover:bg-gray-300 cursor-pointer md:text-xl md:mb-6 md:px-8"
              id="submitButton"
            >
              Submit
            </button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
