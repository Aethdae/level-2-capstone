<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Level Two Capstone</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="module" src="index.js" defer></script>
    <script type="module" src="Responses.js" defer></script>
    <script type="module" src="keys.js" defer></script>
    <script type="module" src="BattleHandler.js" defer></script>
    <script type="module" src="ChatHandler.js" defer></script>
  </head>
  <body class="bg-gray-950">
    <header class="bg-gray-200 py-4 border-b border-gray-400">
      <h1 class="text-black text-3xl font-bold text-center">
        Enemies You Love to Hate
      </h1>
    </header>
    <main class="">
      <section class="h-[60vh] flex flex-col gap-4" id="hero">
        <div
          class="flex justify-center text-white bg-gray-800 outline-2 outline-offset-[-6px] py-2 rounded-2xl"
        >
          <p>Do your tabletop rpg battles feel like this?</p>
        </div>
        <div id="battleContainer" class="flex justify-center">
          <div
            class="bg-gray-400 min-h-[250px] w-[90%] relative rounded-4xl bg-[url('images/grid.png')]"
          >
            <img
              id="warrior"
              class="absolute top-[50%] left-[2%] md:left-[20%] transition-all duration-400 ease-in-out"
              src="images/warrior.png"
              alt="pixel art, poorly drawn knight in armor"
            />
            <img
              id="dragon"
              class="absolute top-[2%] left-[60%] md:left-[60%] transition-all duration-400 ease-in-out"
              src="images/drag.png"
              alt="pixel art, poorly drawn dragon"
            />
          </div>
        </div>
        <div
          class="flex mx-4 gap-3 flex-col items-center text-white bg-gray-800 outline-2 outline-offset-[-6px] py-2 my-3 rounded-2xl md:mx-15 lg:mx-30 lg:my-4"
        >
          <h2
            class="text-2xl bg-gray-50 p-3 rounded-2xl text-red-900 font-bold"
          >
            Well no more!
          </h2>
          <hr />
          <p class="text-lg">Try our state-of-the-art* AI helper!</p>
          <ul
            class="*:italic bg-white text-black border-2 border-black px-6 py-3 rounded-4xl"
          >
            <li>Create monsters in a flash!</li>
            <li>No more boring encounters.</li>
            <li>Seemlessly works in any system.</li>
          </ul>
        </div>
        <div
          class="flex justify-center mx-auto max-w-[50%] text-white bg-gray-800 outline-2 outline-offset-[-6px] py-2 rounded-2xl cursor-pointer hover:outline-white hover:outline-offset-[-2px] hover:bg-gray-700 transition-all duration-150"
        >
          <h2 id="altButton" class="min-w-[300px] text-center">Try it out!</h2>
        </div>
      </section>
    </main>
    <div
      class="fixed bg-gray-500 rounded-2xl outline-2 outline-white transition-(bottom) duration-300 right-[1rem] bottom-[-23rem] min-h-[250px] w-[300px] lg:h-[450px] lg:w-[450px]"
      id="chatContainer"
    >
      <header id="chatHeader">
        <div
          class="bg-gray-400 hover:border-white hover:bg-gray-300 transition-all duration-150 py-3 text-2xl border-b border-2 border-black rounded-3xl cursor-pointer text-center"
        >
          <h2 class="after:content-['_▲']" id="aiAssistantHeader">
            AI Assistant
          </h2>
        </div>
      </header>
      <output
        id="outputContainer"
        class="flex flex-col text-sm bg-gray-200 h-[220px] overflow-y-auto border-2 border-black mb-4 rounded-2xl p-2 gap-2 scroll:rounded-md"
      ></output>
      <div
        class="flex flex-col justify-center gap-2 items-center border-2 border-white rounded-2xl md:gap-6"
      >
        <form class="border-black" id="responseForm">
          <label class="text-black rounded-xl p-2 flex flex-col">
            Response:
            <input
              class="bg-gray-200 text-black border-2 rounded-xl rows-2 border-black px-12"
              type="text"
              name="textArea"
              id="textArea"
              required
              placeholder="Enter a response..."
            />
          </label>
          <div class="flex justify-center">
            <button
              class="bg-gray-400 rounded-xl border-2 border-black px-4 py-2 transition-all duration-200 delay-100 mb-4 hover:border-white hover:bg-gray-300 cursor-pointer"
              id="submitButton"
            >
              Submit
            </button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
