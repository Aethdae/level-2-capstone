<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Level Two Capstone</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="module" src="index.js" defer></script>
    <script type="module" src="Responses.js" defer></script>
    <script type="module" src="keys.js" defer></script>
  </head>
  <body class="bg-gray-950">
    <header class="bg-gray-200 py-4 border-b border-gray-400">
      <h1 class="text-black text-3xl text-center">
        The Enemies You Love to Hate
      </h1>
    </header>
    <main class="">
      <section class="h-[60vh] flex flex-col" id="hero">
        <div class=""></div>
        <div></div>
        <div></div>
      </section>
    </main>
    <div
      class="fixed transition-(bottom) duration-300 right-[2rem] bottom-[-12rem] h-[250px] w-[300px] lg:h-[450px] lg:w-[450px]"
      id="chatContainer"
    >
      <header id="chatHeader">
        <div
          class="bg-gray-400 hover:border-white hover:bg-gray-300 transition-all duration-150 py-3 text-2xl border-b border-2 border-black rounded-3xl cursor-pointer text-center"
        >
          <h2>AI Assistant</h2>
        </div>
      </header>
      <output
        id="outputContainer"
        class="flex flex-col bg-gray-200 max-h-full overflow-y-auto border-2 border-black mb-4 rounded-2xl p-2 gap-2 scroll:rounded-md"
      ></output>
      <form id="responseForm">
        <div
          class="flex bg-black justify-center gap-2 w-[400px] items-center mx-auto border-2 border-white rounded-2xl p-4 w-auto md:gap-6"
        >
          <label
            class="text-white border-2 rounded-xl p-2 bg-gray-400 flex flex-col"
          >
            Response:
            <input
              class="bg-gray-200 text-black rounded-xl border-2 border-black p-2"
              type="text"
              name="textArea"
              id="textArea"
              required
              placeholder="Enter a response (try minion or boss)!"
            ></input>
          </label>
          <label>
            <button
              class="bg-gray-400 rounded-xl border-2 border-black p-8 transition-all duration-200 delay-100 hover:border-white hover:bg-gray-300 cursor-pointer"
              id="submitButton"
            >
              Submit
            </button>
          </label>
        </div>
      </form>
    </div>
  </body>
</html>
